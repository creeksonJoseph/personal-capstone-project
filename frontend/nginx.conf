upstream backend_app {
    server backend:8000;
}

server {
    listen 80;

    # Proxy all /api/ requests to the backend Django container.
    # Using upstream block prevents nginx from refusing to start when backend is temporarily down.
    location /api/ {
        proxy_pass http://backend_app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }


    # Serve the React SPA for all other routes
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
