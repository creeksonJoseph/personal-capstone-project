<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brich Hills School</title>

      rel="stylesheet"
    />
    <!-- Tailwind CSS CDN -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#8C0D18",
              accent: "#A9DCE6",
              charcoal: "#1F1F1F",
              "off-white": "#F7F7F7",
              "background-light": "#F7F7F7",
            },
            fontFamily: {
              display: ["'Playfair Display'", "serif"],
              "serif-bold": ["'Playfair Display'", "serif"],
              "serif-body": ["Lora", "serif"],
              body: ["Lora", "serif"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;

      body {
        font-family: "Lora", serif;

  <body>
    <div id="root"></div>
    <script>
      (function() {
        // Ping backend to wake up Render instance
        const BACKEND_URL = "https://birch-hills-school.onrender.com/api/";
        fetch(BACKEND_URL, { mode: 'no-cors' })
          .then(() => console.log('Backend wake-up ping sent'))
          .catch(err => console.log('Backend wake-up ping failed', err));
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
